datatables:
  version: VERSION
  js:
    js/datatables.js: {}
  dependencies:
    - core/jquery
    - core/drupal
    - core/drupalSettings
    - core/once
    - datatables/datatables.net

datatables.net:
  remote: https://datatables.net/
  version: 2.0.1
  license:
    name: MIT
    url: https://datatables.net/license/mit
    gpl-compatible: true
  js:
    /libraries/datatables/datatables.min.js: {}
  css:
    component:
      /libraries/datatables/datatables.min.css: {}
  dependencies:
    - core/jquery

datatables.default:
  version: VERSION
  css:
    theme:
      css/datatables.css: {}

datatables.tabletools:
  version: VERSION
  js:
    /libraries/datatables/extensions/Buttons/js/dataTables.buttons.min.js: {}
    /libraries/datatables/extensions/Buttons/js/buttons.html5.min.js: {}
    /libraries/datatables/extensions/Buttons/js/buttons.print.min.js: {}
    /libraries/datatables/extensions/Buttons/js/buttons.colVis.min.js: {}
  css:
    component:
      /libraries/datatables/extensions/Buttons/css/buttons.dataTables.min.css: {}
  dependencies:
    - datatables/datatables

datatables_base:
  version: 1.x
  js:
    js/datatables_base.js: {}
  dependencies:
    - core/jquery
    - core/drupal
    - core/drupalSettings
    - core/once
    - datatables/datatables

datatables_base_detail:
  version: 1.x
  js:
    js/datatables_base_detail.js: {}
  dependencies:
    - core/jquery
    - core/drupal
    - core/drupalSettings
    - core/once
    - datatables/datatables

# New multi-table support library
datatables_base_multi:
  version: 1.x
  js:
    js/datatables_base_multi.js: {}
  dependencies:
    - core/jquery
    - core/drupal
    - core/drupalSettings
    - core/once
    - datatables/datatables

tooltip-init:
  js:
    js/tooltip-init.js: {}
  dependencies:
    - datatables/bootstrap5-js

bootstrap5-js:
  js:
    https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js: { type: external }
